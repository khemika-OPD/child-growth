<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pediatric Growth Estimator - OPD Takhli</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0fdf4; color: #1e293b; display: flex; justify-content: center; padding: 15px; min-height: 100vh; }
        
        .container { background: white; max-width: 450px; width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.12); border: 1px solid #bbf7d0; display: flex; flex-direction: column; }
        
        .header { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 22px 15px; text-align: center; position: relative; }
        .header h1 { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
        .header p { opacity: 0.95; font-size: 12px; color: #d1fae5; }
        
        .hub-btn { position: absolute; top: 15px; left: 15px; background: rgba(255, 255, 255, 0.2); color: white; text-decoration: none; font-size: 11px; padding: 5px 10px; border-radius: 6px; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.3); transition: 0.2s; }
        .hub-btn:hover { background: rgba(255, 255, 255, 0.35); }

        .content { padding: 20px; flex-grow: 1; }
        
        .gender-container { display: flex; gap: 10px; margin-bottom: 16px; }
        .gender-btn { flex: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.15s; color: #4b5563; }
        .gender-btn.active-boy { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
        .gender-btn.active-girl { border-color: #ec4899; background: #fdf2f8; color: #b71c1c; }

        .age-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .age-col { flex: 1; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; color: #374151; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 12px; border: 2px solid #bbf7d0; border-radius: 8px; font-size: 15px; font-weight: bold; outline: none; background: #fbfdfb; }
        .form-control:focus { border-color: #10b981; background: #f0fdf4; }
        
        .submit-btn { width: 100%; padding: 14px; background: #10b981; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
        .submit-btn:hover { background: #059669; }

        .result-card { background: #f0fdf4; border: 2px solid #6ee7b7; border-radius: 14px; padding: 20px; margin-top: 20px; display: none; }
        .result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #a7f3d0; }
        .result-row:last-child { border-bottom: none; }
        .result-label { font-size: 13px; font-weight: bold; color: #065f46; }
        .result-value { font-size: 15px; font-weight: 800; color: #047857; }

        .advise-box { background: #ffffff; border: 1.5px solid #6ee7b7; border-radius: 10px; padding: 12px; margin-top: 12px; font-size: 13px; line-height: 1.5; color: #1e293b; }
        .btn-reset { width: 100%; padding: 12px; background: #64748b; color: white; border: none; border-radius: 8px; margin-top: 15px; cursor: pointer; font-size: 14px; font-weight: bold; }
        
        .qr-section { text-align: center; padding: 15px 10px 5px 10px; border-top: 1px dashed #6ee7b7; margin-top: 20px; display: none; }
        .btn-qr { background: #e6fcf5; color: #047857; padding: 10px 18px; border-radius: 20px; font-size: 14px; border: 1px solid #6ee7b7; cursor: pointer; font-weight: bold; width: 100%; }
        #qrcode { display: flex; justify-content: center; margin-top: 15px; padding: 10px; background: #ffffff; border-radius: 10px; }
        
        footer { background: #1e293b; color: #cbd5e1; text-align: center; padding: 12px; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="https://khemika-opd.github.io/OPD-Takhli-Digital-Toolkit/" class="hub-btn">⬅️ ถอยกลับ</a>
        <h1>Child Growth Estimator</h1>
        <p>ระบบประเมินการเจริญเติบโตอิงเกณฑ์มาตรฐานไทย</p>
    </div>

    <div class="content">
        <!-- 1. ส่วนเลือกเพศ -->
        <label style="display: block; font-size: 13px; font-weight: bold; color: #374151; margin-bottom: 6px;">1. เพศของเด็ก</label>
        <div class="gender-container">
            <button type="button" id="btn-boy" class="gender-btn active-boy" onclick="selectGender('male')">👦 เพศชาย</button>
            <button type="button" id="btn-girl" class="gender-btn" onclick="selectGender('female')">👧 เพศหญิง</button>
        </div>

        <!-- 2. ส่วนกรอกอายุจัดวางคู่กันพร้อมตัวหนังสือและไอคอนกำกับชัดเจน -->
        <label style="display: block; font-size: 13px; font-weight: bold; color: #374151; margin-bottom: 6px;">2. อายุปัจจุบัน</label>
        <div class="age-row">
            <div class="age-col">
                <span style="font-size: 11px; font-weight: bold; color: #64748b; display: block; margin-bottom: 4px;">📅 ปี</span>
                <input type="number" id="age-years" class="form-control" placeholder="ระบุจำนวนปี (0-15)" min="0" max="15" value="0">
            </div>
            <div class="age-col">
                <span style="font-size: 11px; font-weight: bold; color: #64748b; display: block; margin-bottom: 4px;">🌙 เดือน</span>
                <input type="number" id="age-months" class="form-control" placeholder="ระบุจำนวนเดือน (0-11)" min="0" max="11" value="0">
            </div>
        </div>

        <!-- 3. ข้อมูลสัดส่วนคัดกรองจริงหน้างาน -->
        <div class="form-group">
            <label>⚖️ น้ำหนักที่วัดได้จริง (กิโลกรัม)</label>
            <input type="number" id="real-weight" class="form-control" placeholder="เช่น 12.5" step="0.1">
        </div>

        <div class="form-group">
            <label>📏 ส่วนสูงที่วัดได้จริง (เซนติเมตร)</label>
            <input type="number" id="real-height" class="form-control" placeholder="เช่น 90" step="0.1">
        </div>

        <button class="submit-btn" onclick="estimateGrowth()">🧬 ประมวลผลเกณฑ์ทันที</button>

        <!-- การ์ดสรุปผลเชิงลึกเพื่อสื่อสารกับพ่อแม่ -->
        <div id="result-card" class="result-card">
            <div class="result-row">
                <span class="result-label">👫 เพศและอายุที่ประเมิน:</span>
                <span class="result-value" id="res-identity">-</span>
            </div>
            <div class="result-row">
                <span class="result-label">⚖️ น้ำหนักอ้างอิงมาตรฐาน:</span>
                <span class="result-value" id="res-weight">- kg</span>
            </div>
            <div class="result-row">
                <span class="result-label">📏 ส่วนสูงอ้างอิงมาตรฐาน:</span>
                <span class="result-value" id="res-height">- cm</span>
            </div>
            
            <div class="advise-box" id="parent-advise">
                <strong>📢 สรุปสำหรับแจ้งผู้ปกครอง:</strong><br>
                <span id="advise-text">-</span>
            </div>

            <button class="btn-reset" onclick="resetForm()">🔄 ประเมินเคสถัดไป</button>
        </div>

        <div class="qr-section" id="qr-area">
            <button class="btn-qr" onclick="toggleQR()">แสดง/ซ่อน QR สำหรับแชร์</button>
            <div id="qr-container" style="display:none;"><div id="qrcode"></div></div>
        </div>
    </div>

    <footer>
        © 2026 งานผู้ป่วยนอก โรงพยาบาลตาคลี | พัฒนาโดย Khemika Pongsri
    </footer>
</div>

<script>
    let currentGender = 'male';

    function selectGender(gender) {
        currentGender = gender;
        const btnBoy = document.getElementById('btn-boy');
        const btnGirl = document.getElementById('btn-girl');
        
        if (gender === 'male') {
            btnBoy.classList.add('active-boy');
            btnGirl.classList.remove('active-girl');
        } else {
            btnBoy.classList.remove('active-boy');
            btnGirl.classList.add('active-girl');
        }
    }

    function estimateGrowth() {
        const years = parseInt(document.getElementById('age-years').value) || 0;
        const months = parseInt(document.getElementById('age-months').value) || 0;
        const realW = parseFloat(document.getElementById('real-weight').value);
        const realH = parseFloat(document.getElementById('real-height').value);
        
        if (isNaN(realW) || realW <= 0 || isNaN(realH) || realH <= 0) {
            alert('กรุณากรอกน้ำหนักและส่วนสูงที่วัดได้จริงให้ครบถ้วนก่อนประมวลผลค่ะ');
            return;
        }

        let totalAge = years + (months / 12);
        let idealW = 0;
        let idealH = 0;

        if (currentGender === 'male') {
            if (totalAge < 1) {
                idealW = (months + 9) / 2;
                idealH = (months * 2.5) + 50;
            } else if (totalAge <= 8) {
                idealW = (totalAge * 2) + 8;
                idealH = (totalAge * 6) + 77;
            } else {
                idealW = (totalAge * 3) + 7;
                idealH = (totalAge * 5) + 85;
            }
        } else {
            if (totalAge < 1) {
                idealW = ((months + 9) / 2) * 0.95;
                idealH = (months * 2.4) + 49;
            } else if (totalAge <= 8) {
                idealW = ((totalAge * 2) + 8) * 0.96;
                idealH = ((totalAge * 6) + 77) * 0.99;
            } else {
                idealW = ((totalAge * 3) + 7) * 0.96;
                idealH = ((totalAge * 5) + 85) * 0.99;
            }
        }

        const genderText = (currentGender === 'male') ? 'เพศชาย' : 'เพศหญิง';
        document.getElementById('res-identity').innerText = `${genderText} (${years} ปี ${months} เดือน)`;
        document.getElementById('res-weight').innerText = idealW.toFixed(1) + " kg";
        document.getElementById('res-height').innerText = idealH.toFixed(1) + " cm";

        const adviseText = document.getElementById('advise-text');
        let weightDiff = realW - idealW;
        let statusMsg = "";

        if (Math.abs(weightDiff) <= (idealW * 0.1)) {
            statusMsg = "🟢 ร่างกายเติบโตสมส่วนอยู่ตามเกณฑ์มาตรฐานปกติค่ะ";
        } else if (weightDiff > (idealW * 0.1)) {
            statusMsg = "🟡 เริ่มมีภาวะน้ำหนักเกินเกณฑ์เฉลี่ย แนะนำหลีกเลี่ยงของหวานและน้ำอัดลมนะคะ";
        } else {
            statusMsg = "🔴 น้ำหนักค่อนข้างค่อนไปทางต่ำกว่าเกณฑ์ เน้นเสริมอาหารหมู่โปรตีนและนมนะคะ";
        }

        adviseText.innerHTML = `น้องมีน้ำหนักจริง ${realW} kg (ค่ามาตรฐานเพศนี้วัยนี้คือ ${idealW.toFixed(1)} kg) ผลประเมิน: <span style="font-weight:bold; color:#047857;">${statusMsg}</span>`;

        document.getElementById('result-card').style.display = 'block';
        document.getElementById('qr-area').style.display = 'block';
    }

    var qrcode = new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 128, height: 128 });
    function toggleQR() {
        var x = document.getElementById("qr-container");
        x.style.display = (x.style.display === "none") ? "block" : "none";
    }

    function resetForm() {
        document.getElementById('age-years').value = "0";
        document.getElementById('age-months').value = "0";
        document.getElementById('real-weight').value = "";
        document.getElementById('real-height').value = "";
        selectGender('male');
        document.getElementById('result-card').style.display = 'none';
        document.getElementById('qr-area').style.display = 'none';
        document.getElementById('qr-container').style.display = 'none';
    }
</script>

</body>
</html>
